<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Aniisa Bihi — software engineer building headless commerce platforms, developer tooling, and interactive web experiences."
    />
    <title>Aniisa Bihi</title>
    <link rel="icon" href="/img/aniisa.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <script>
      (function () {
        var path = location.pathname;
        var postsMatch = path.match(/\/posts\/(?:[^/]+\/)+([^/]+)\.html$/);
        if (postsMatch) {
          location.replace("/experience/" + postsMatch[1]);
          return;
        }
        var workMatch = path.match(/^\/work\/([^/]+)\/?$/);
        if (workMatch) {
          location.replace("/experience/" + workMatch[1]);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
